name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy dgtc
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            daekwangtech_homepage_v3_function_pass/package-lock.json

      - name: Install worker dependencies
        run: npm ci

      - name: Install public app dependencies
        working-directory: daekwangtech_homepage_v3_function_pass
        run: npm install --ignore-scripts

      - name: Verify public app
        working-directory: daekwangtech_homepage_v3_function_pass
        run: npm run verify

      - name: Build public app
        working-directory: daekwangtech_homepage_v3_function_pass
        run: npm run build

      - name: Verify Cloudflare auth
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          npx wrangler whoami
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Resolve D1 resource in token account
        run: |
          export DB_ID="$(npx wrangler d1 list --json | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{const rows=JSON.parse(s);const row=rows.find(x=>x.name==='dgtc_content');if(!row){process.exit(2)}process.stdout.write(row.uuid)})")"
          test -n "$DB_ID"
          node -e "const fs=require('fs');const c=JSON.parse(fs.readFileSync('wrangler.jsonc','utf8'));c.d1_databases[0].database_id=process.env.DB_ID;fs.writeFileSync('wrangler.ci.jsonc',JSON.stringify(c,null,2)+'\n')"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Apply additive D1 migrations
        run: npx wrangler d1 migrations apply dgtc_content --remote --config wrangler.ci.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy to Cloudflare
        run: npx wrangler deploy --config wrangler.ci.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
