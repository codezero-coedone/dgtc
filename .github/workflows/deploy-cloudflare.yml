name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy dgtc
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            daekwangtech_homepage_v3_function_pass/package-lock.json

      - name: Install worker dependencies
        run: npm ci

      - name: Install public app dependencies
        working-directory: daekwangtech_homepage_v3_function_pass
        run: npm ci

      - name: Verify public app
        working-directory: daekwangtech_homepage_v3_function_pass
        run: npm run lint

      - name: Build public app
        working-directory: daekwangtech_homepage_v3_function_pass
        run: npm run build

      - name: Restore Wrangler auth
        run: |
          for dir in "$HOME/.config/.wrangler" "$HOME/.wrangler" "$HOME/.config/wrangler"; do
            mkdir -p "$dir/config"
            printf '%s' "$WRANGLER_CONFIG_DEFAULT_TOML" > "$dir/config/default.toml"
            chmod 600 "$dir/config/default.toml"
          done
          test -s "$HOME/.config/.wrangler/config/default.toml"
        env:
          WRANGLER_CONFIG_DEFAULT_TOML: ${{ secrets.WRANGLER_CONFIG_DEFAULT_TOML }}

      - name: Verify Wrangler auth
        run: npx wrangler whoami
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare
        run: npx wrangler deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
