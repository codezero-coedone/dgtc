name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy dgtc
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            daekwangtech_homepage_v3_function_pass/package-lock.json

      - name: Install worker dependencies
        run: npm ci

      - name: Install public app dependencies
        working-directory: daekwangtech_homepage_v3_function_pass
        run: npm install --ignore-scripts

      - name: Verify public app
        working-directory: daekwangtech_homepage_v3_function_pass
        run: npm run verify

      - name: Build public app
        working-directory: daekwangtech_homepage_v3_function_pass
        run: npm run build

      - name: Verify Cloudflare auth
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          npx wrangler whoami
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Create static compatibility deploy config
        run: node -e "const fs=require('fs');const c=JSON.parse(fs.readFileSync('wrangler.jsonc','utf8'));fs.writeFileSync('wrangler.ci.jsonc',JSON.stringify({name:c.name,compatibility_date:c.compatibility_date,assets:c.assets},null,2)+'\n')"

      - name: Deploy to Cloudflare
        run: npx wrangler deploy --config wrangler.ci.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
